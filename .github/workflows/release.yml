name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ""
          - platform: macos-latest
            args: "--target universal-apple-darwin"
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Linux dependencies ──────────────────────────────────────────────────
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      # ── Rust ───────────────────────────────────────────────────────────────
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      # ── Node ───────────────────────────────────────────────────────────────
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install frontend dependencies
        run: npm install

      # ── Build & Release ────────────────────────────────────────────────────
      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "CoolView ${{ github.ref_name }}"
          releaseBody: |
            ## CoolView ${{ github.ref_name }}

            ### Install

            | Platform | File |
            |----------|------|
            | Linux (deb) | `coolview_*_amd64.deb` |
            | Linux (tar.gz) | `coolview_*_amd64.tar.gz` |
            | macOS (universal) | `CoolView_*_universal.dmg` |
            | Windows | `CoolView_*_x64-setup.exe` |

            > **macOS:** Gatekeeper will warn — right-click → Open → Open anyway.  
            > **Windows:** SmartScreen may warn — click More info → Run anyway.  
            > **Linux:** May require `lm-sensors` (`sudo apt install lm-sensors && sudo sensors-detect`).

            ---
            ☕ [Buy me a coffee](https://ko-fi.com/growlinghuel) · 💖 [GitHub Sponsors](https://github.com/sponsors/growlinghuel)
          releaseDraft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') }}
          args: ${{ matrix.args }}
